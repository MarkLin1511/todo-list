<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Daily Habit Tracker</p>
          <h1>Habit Garden</h1>
          <p class="hero-text">
            Add habits, check them off each day, and watch your consistency build
            over time.
          </p>
        </div>
        <div class="today-card panel">
          <span class="today-label">Today</span>
          <strong id="today-date"></strong>
          <p id="today-summary">0 of 0 habits completed</p>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <form id="habit-form" class="habit-form">
            <label class="field">
              <span>Habit name</span>
              <input
                id="habit-name"
                name="habit"
                type="text"
                maxlength="100"
                placeholder="Drink 8 glasses of water"
                autocomplete="off"
                required
              />
            </label>

            <label class="field">
              <span>Color</span>
              <select id="habit-color" name="color">
                <option value="sun">Sun</option>
                <option value="mint">Mint</option>
                <option value="ocean">Ocean</option>
                <option value="berry">Berry</option>
              </select>
            </label>

            <button type="submit" class="primary-button">Add habit</button>
          </form>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="section-kicker">Track today</p>
              <h2>Your habits</h2>
            </div>
            <button id="reset-today" class="secondary-button" type="button">
              Reset today
            </button>
          </div>

          <ul id="habit-list" class="habit-list" aria-live="polite"></ul>

          <template id="empty-state-template">
            <li class="empty-state">
              <h3>No habits yet</h3>
              <p>Start with one small habit you want to repeat every day.</p>
            </li>
          </template>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
